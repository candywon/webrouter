version: '3.8'

services:
  # wr-proxy 代理网关
  wr-proxy:
    build:
      context: ../wr-proxy
      dockerfile: ../deploy/Dockerfile-proxy
    container_name: webrouter-proxy
    restart: always
    ports:
      - "5051:5051"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - proxy_data:/app/data
    depends_on:
      - webrouter

  # WebRouter 管理后台
  webrouter:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile
    container_name: webrouter-app
    restart: always
    ports:
      - "5050:5050"
    environment:
      - TZ=Asia/Shanghai
      - FLASK_ENV=production
      - DATABASE_URI=${DB_DSN:-sqlite:///data/webrouter.db}
      - REDIS_URL=redis://redis:6379
    volumes:
      - webrouter_data:/app/data
    depends_on:
      - redis

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: webrouter-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  proxy_data:
  webrouter_data:
  redis_data:
