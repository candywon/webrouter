app = "webrouter-demo"

[build]
  dockerfile = "deploy/Dockerfile.demo"

[env]
  WEBROUTER_DEMO = "1"
  FLASK_ENV = "production"
  TZ = "UTC"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "webrouter_data"
  destination = "/app/data"
  processes = ["app"]